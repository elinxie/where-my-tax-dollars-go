name: Deploy to GitHub Pages

# Additive, reversible static-deploy path (does not touch the Codex/OpenAI Sites
# deploy or the `sites` remote). It stays inert until GitHub Pages is enabled:
# repo Settings -> Pages -> Source = "GitHub Actions".
#
# Trigger manually (workflow_dispatch) or on push to main once Pages is enabled.

on:
  workflow_dispatch:
  push:
    branches: [main]

# Least privilege needed to publish Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build static site
        run: pnpm run build:static
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-static

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
